spring:
  application:
    name: fx-payment-processor

  # ── Embedded ActiveMQ Artemis (zero-config, open-source JMS) ────────────
  artemis:
    mode: embedded           # starts an in-process broker – no external server needed
    embedded:
      enabled: true
      persistent: false      # in-memory for local dev; set true for durability
      queues:
        - fx.pacs009.inbound
        - fx.payment.valid
        - fx.payment.invalid

  # ── H2 In-Memory Database (open-source, zero-config) ────────────────────
  datasource:
    url: jdbc:h2:mem:fxpayments;DB_CLOSE_DELAY=-1;DB_CLOSE_ON_EXIT=FALSE
    driver-class-name: org.h2.Driver
    username: sa
    password:

  # ── JPA ──────────────────────────────────────────────────────────────────
  jpa:
    hibernate:
      ddl-auto: create-drop          # auto-create schema from entities (dev only)
    show-sql: false
    properties:
      hibernate:
        format_sql: true
        dialect: org.hibernate.dialect.H2Dialect

  # ── H2 console settings. The standalone H2 web console is exposed by
  # ── EmbeddedInspectionConfig at http://localhost:8082.
  h2:
    console:
      enabled: true
      path: /h2-console

# ── Embedded inspection ports (available only while this JVM is running) ──
fx:
  inspection:
    h2:
      enabled: true
      tcp-port: 9092
      web:
        enabled: true
        web-port: 8082
    artemis:
      enabled: true
      host: 127.0.0.1
      port: 61616

# ── Logging ──────────────────────────────────────────────────────────────
logging:
  level:
    com.fx.payment: DEBUG
    org.springframework.jms: INFO
    org.apache.activemq: WARN

---
# ══════════════════════════════════════════════════════════════════════════
# PostgreSQL + Standalone Artemis profile  (start with docker-compose first)
# Usage: mvn spring-boot:run -Dspring-boot.run.profiles=postgres
# ══════════════════════════════════════════════════════════════════════════
spring:
  config:
    activate:
      on-profile: postgres

  datasource:
    url: jdbc:postgresql://localhost:5432/fxpayments
    username: fxuser
    password: fxpassword
    driver-class-name: org.postgresql.Driver

  jpa:
    hibernate:
      ddl-auto: update
    properties:
      hibernate:
        dialect: org.hibernate.dialect.PostgreSQLDialect

  artemis:
    mode: native
    broker-url: tcp://localhost:61616
    user: artemis
    password: artemis
