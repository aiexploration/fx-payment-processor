spring:
  application:
    name: fx-payment-processor

  # ── RabbitMQ (Docker) ─────────────────────────────────────────────────────
  rabbitmq:
    host: localhost
    port: 5672
    username: guest
    password: guest

  # ── PostgreSQL (Docker) ─────────────────────────────────────────────────
  datasource:
    url: jdbc:postgresql://localhost:5432/fxpayments
    username: fxuser
    password: fxpassword
    driver-class-name: org.postgresql.Driver

  # ── JPA ──────────────────────────────────────────────────────────────────
  jpa:
    hibernate:
      ddl-auto: update
    show-sql: true
    properties:
      hibernate:
        format_sql: true
        dialect: org.hibernate.dialect.PostgreSQLDialect

# ── Logging ──────────────────────────────────────────────────────────────
logging:
  level:
    com.fx.payment: DEBUG
    org.springframework.amqp: INFO
    com.rabbitmq: WARN
