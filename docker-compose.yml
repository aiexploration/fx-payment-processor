version: '3.9'

# ══════════════════════════════════════════════════════════════════════════
# FX Payment Processor – Infrastructure Stack
# Open-source components only:
#   • RabbitMQ                 (message broker)
#   • PostgreSQL               (database)
#
# Usage:
#   docker-compose up -d               → start infrastructure
#   docker-compose down -v             → stop and remove volumes
#   docker-compose logs -f rabbitmq    → tail broker logs
# ══════════════════════════════════════════════════════════════════════════

services:

  # ── RabbitMQ ────────────────────────────────────────────────────────────
  rabbitmq:
    image: rabbitmq:3-management-alpine
    container_name: fx-rabbitmq
    ports:
      - "5672:5672"     # AMQP
      - "15672:15672"   # Management UI → http://localhost:15672 (guest/guest)
    environment:
      RABBITMQ_DEFAULT_USER: guest
      RABBITMQ_DEFAULT_PASS: guest
    volumes:
      - rabbitmq-data:/var/lib/rabbitmq
    healthcheck:
      test: ["CMD", "rabbitmq-diagnostics", "ping"]
      interval: 10s
      timeout: 5s
      retries: 10

  # ── PostgreSQL ────────────────────────────────────────────────────────────
  postgres:
    image: postgres:16-alpine
    container_name: fx-postgres
    ports:
      - "5432:5432"
    environment:
      POSTGRES_DB:       fxpayments
      POSTGRES_USER:     fxuser
      POSTGRES_PASSWORD: fxpassword
    volumes:
      - postgres-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U fxuser -d fxpayments"]
      interval: 5s
      timeout: 3s
      retries: 10
  # ── pgAdmin ──────────────────────────────────────────────────────────────
  pgadmin:
    image: dpage/pgadmin4
    container_name: fx-pgadmin
    ports:
      - "8080:80"
    environment:
      PGADMIN_DEFAULT_EMAIL: admin@fx.com
      PGADMIN_DEFAULT_PASSWORD: admin
    depends_on:
      - postgres
volumes:
  rabbitmq-data:
  postgres-data:
